# TV box — minimal Hyprland config
# Controlled via KDEConnect from phone

monitor=,preferred,auto,1

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

input {
    kb_layout = us
    follow_mouse = 1
}

# Autostart
exec-once = waybar
exec-once = kdeconnect-indicator
exec-once = firefox

# Firefox — fullscreen, no borders
windowrulev2 = fullscreen, class:(firefox)
windowrulev2 = noborder, class:(firefox)

# Basic binds (for when a keyboard is connected)
$mod = SUPER
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod, Return, exec, firefox
bind = $mod, E, exec, thunar
